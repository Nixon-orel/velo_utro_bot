  start: |
    🚴‍♀️ <b>Добро пожаловать в Велоутро Бот!</b> 🌅

    Привет! Я помогу тебе организовывать и находить мероприятия в сообществе "Велоутро Орел".

    🎯 <b>Что я умею:</b>
    • Создавать велопоездки и другие активности
    • Помогать находить единомышленников для совместных покатушек
    • Уведомлять об изменениях в мероприятиях
    • Публиковать анонсы в общий канал

    🚀 <b>Начни прямо сейчас:</b>

    🔸 /create - Создать новое мероприятие
    🔸 /find - Найти подходящее мероприятие
    🔸 /my_events - Мои мероприятия (посмотреть/изменить/удалить)
    🔸 /help - Подробная справка по использованию

    <i>Присоединяйся к активному сообществу и кайфуй вместе с нами! 💪</i>

  menu: |
    🚴‍♀️ <b>Главное меню Velo Utro Bot</b> 🌅

    🚀 <b>Доступные команды:</b>

    🔸 /create - Создать новое мероприятие
    🔸 /find - Найти подходящее мероприятие
    🔸 /my_events - Мои мероприятия (посмотреть/изменить/удалить)
    🔸 /help - Подробная справка по использованию

    <i>Выбери нужную команду и начни организовывать активности! 💪</i>

  admin_commands: |

    👑 Команды администратора:
    🔸 /announcement - Опубликовать анонс мероприятий на сегодня
    🔸 /statistics - Просмотреть статистику за прошлый месяц
    🔸 /weather_status - Проверить статус погодной системы
    🔸 /scheduler_status - Проверить статус системы планировщика

  help: |
    📖 <b>Подробное руководство по использованию бота</b>

    <b>🔸 Создание мероприятия (/create)</b>
    1. Выберите дату в календаре
    2. Укажите точное время начала (например: 15:00)
    3. Выберите тип мероприятия (велосипед, настолки и т.д.)
    4. Укажите место проведения
    5. Для активных мероприятий: укажите дистанцию, темп, трек и карту
    6. Добавьте дополнительную информацию (необязательно)
    7. Выберите способ получения прогноза погоды (по умолчанию Орёл или свои координаты)
    8. Опубликуйте мероприятие в канале кнопкой "🖨️ Опубликовать"

    <b>🔸 Прогноз погоды 🌤️</b>
    • Автоматически получается для всех новых мероприятий
    • <b>Орёл по умолчанию</b> - быстрое создание с погодой для города
    • <b>Свои координаты</b> - точный прогноз для конкретного места
    • <b>Ограничение:</b> прогноз доступен только на 14 дней вперёд
    • Участники получают уведомления только при критических изменениях прогноза

    <b>🔸 Поиск мероприятий (/find)</b>
    • <b>Сегодня</b> - мероприятия на текущий день
    • <b>Завтра</b> - мероприятия на завтра
    • <b>На неделе</b> - все мероприятия на ближайшие 7 дней
    • <b>Все</b> - все предстоящие мероприятия

    <b>🔸 Управление мероприятиями (/my_events)</b>
    • <b>Я создал</b> - ваши созданные мероприятия (редактирование, удаление, публикация)
    • <b>Я участник</b> - мероприятия, в которых вы участвуете (отказ от участия)

    <b>🔸 Участие в мероприятиях</b>
    • Нажмите "✅ Присоединиться" чтобы стать участником
    • Нажмите "🚫 Отказаться" чтобы отменить участие

    <b>🔸 Редактирование мероприятий</b>
    Только автор может редактировать мероприятие:
    • <b>📅 Дата</b> - изменить дату проведения
    • <b>🕑 Время старта</b> - изменить время
    • <b>🗺️ Место проведения</b> - изменить локацию
    • <b>📝 Описание</b> - изменить дополнительную информацию
    • <b>❌ Удалить</b> - удалить мероприятие (участники получат уведомление)

    <b>🔸 Уведомления</b>
    Вы получите уведомления когда:
    • Автор изменил дату, время, место или описание мероприятия
    • Мероприятие было удалено автором
    • Произошли критические изменения прогноза погоды для мероприятия

    <b>🔸 Типы мероприятий</b>
    • <b>Статические</b>: настолки, тусы, другое - без дистанции и темпа
    • <b>Активные</b>: велосипед, активности на воде, прогулка - с указанием дистанции, темпа, маршрута и карты

    <b>🔸 Ошибки и предложения по функционалу</b>
    • Писать сюда @nixon_tut

